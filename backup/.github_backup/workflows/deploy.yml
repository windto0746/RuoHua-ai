# GitHub Actions Workflow for RuoHua AI App
# 自动部署到 GitHub Codespaces

name: Deploy RuoHua AI

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: 安装依赖
        run: |
          pip install gradio dashscope python-dotenv
      
      - name: 设置环境变量
        run: |
          echo "DASHSCOPE_API_KEY=${{ secrets.DASHSCOPE_API_KEY }}" >> $GITHUB_ENV
      
      - name: 测试API连接
        run: |
          python -c "
          import os
          import dashscope
          from dashscope import Generation
          dashscope.api_key = os.environ.get('DASHSCOPE_API_KEY', '')
          if dashscope.api_key:
              print('✅ API Key已配置')
              r = Generation.call(model='qwen-plus', messages=[{'role': 'user', 'content': 'test'}])
              print(f'API状态: {r.status_code}')
          else:
              print('❌ API Key未设置')
          "
      
      - name: 启动应用 (后台)
        run: |
          python app_final.py &
          sleep 10
          curl -s http://localhost:7860 | head -20 || echo "等待启动..."
